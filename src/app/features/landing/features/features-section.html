<section class="section-block" appScrollReveal>
  <div class="section-head">
    <p class="tag">Platform Highlights</p>
    <h2>Built for every stage of modern farming</h2>
  </div>

  <div class="feature-grid">
    @for (item of features; track item.title) {
      <mat-card class="feature-card">
        <div class="icon-wrap">
          <mat-icon>{{ item.icon }}</mat-icon>
        </div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </mat-card>
    }
  </div>
</section>
