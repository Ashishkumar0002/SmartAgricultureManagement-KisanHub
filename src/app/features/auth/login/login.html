<section class="bg-auth auth-shell">
	<mat-card class="auth-card page-card glass-card">
		<h2>Welcome back</h2>
		<p>Log in to your KisanHub account.</p>

	<form [formGroup]="form" (ngSubmit)="submit()">
		<mat-form-field appearance="outline">
			<mat-label>Email or username</mat-label>
			<input matInput type="text" formControlName="email" />
			<mat-error *ngIf="form.controls.email.invalid && form.controls.email.touched">
				Enter your email address or username
			</mat-error>
		</mat-form-field>

		<mat-form-field appearance="outline">
			<mat-label>Password</mat-label>
			<input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
			<button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
				<mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
			</button>
			<mat-error *ngIf="form.controls.password.invalid && form.controls.password.touched">
				Password must be at least 6 characters
			</mat-error>
		</mat-form-field>

		<button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
			<mat-spinner diameter="20" *ngIf="isSubmitting"></mat-spinner>
			<span *ngIf="!isSubmitting">Login</span>
		</button>
	</form>

	<p class="switch">New user? <a routerLink="/auth/register">Create account</a></p>
  </mat-card>
</section>
