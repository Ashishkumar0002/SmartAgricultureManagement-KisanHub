<section>
	<h2 class="section-title">Farm Management</h2>

	<mat-card class="page-card form-card">
		<form [formGroup]="form" (ngSubmit)="submit()">
			<mat-form-field appearance="outline">
				<mat-label>Farm name</mat-label>
				<input matInput formControlName="name" />
			</mat-form-field>

			<mat-form-field appearance="outline">
				<mat-label>Location</mat-label>
				<input matInput formControlName="location" />
			</mat-form-field>

			<mat-form-field appearance="outline">
				<mat-label>Total land (acres)</mat-label>
				<input matInput type="number" formControlName="total_land" />
			</mat-form-field>

			<mat-form-field appearance="outline">
				<mat-label>Phone</mat-label>
				<input matInput formControlName="phone" />
			</mat-form-field>

			<div class="actions">
				<button mat-flat-button color="primary" type="submit">{{ editingId ? 'Update' : 'Add Farm' }}</button>
				<button mat-button type="button" *ngIf="editingId" (click)="cancelEdit()">Cancel</button>
			</div>
		</form>
	</mat-card>

	<mat-card class="page-card table-card">
		<table mat-table [dataSource]="farmers">
			<ng-container matColumnDef="name">
				<th mat-header-cell *matHeaderCellDef>Name</th>
				<td mat-cell *matCellDef="let row">{{ row.name }}</td>
			</ng-container>

			<ng-container matColumnDef="location">
				<th mat-header-cell *matHeaderCellDef>Location</th>
				<td mat-cell *matCellDef="let row">{{ row.location }}</td>
			</ng-container>

			<ng-container matColumnDef="total_land">
				<th mat-header-cell *matHeaderCellDef>Land</th>
				<td mat-cell *matCellDef="let row">{{ row.total_land }}</td>
			</ng-container>

			<ng-container matColumnDef="phone">
				<th mat-header-cell *matHeaderCellDef>Phone</th>
				<td mat-cell *matCellDef="let row">{{ row.phone || '-' }}</td>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef>Actions</th>
				<td mat-cell *matCellDef="let row">
					<button mat-button color="primary" (click)="startEdit(row)">Edit</button>
					<button mat-button color="warn" (click)="remove(row.id)">Delete</button>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
		</table>
	</mat-card>
</section>
