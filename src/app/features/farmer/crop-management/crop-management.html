<section>
	<h2 class="section-title">Crop Management</h2>

	<mat-card class="page-card form-card">
		<form [formGroup]="form" (ngSubmit)="submit()">
			<mat-form-field appearance="outline">
				<mat-label>Crop name</mat-label>
				<input matInput formControlName="name" />
			</mat-form-field>

			<mat-form-field appearance="outline">
				<mat-label>Season</mat-label>
				<input matInput formControlName="season" />
			</mat-form-field>

			<mat-form-field appearance="outline">
				<mat-label>Area (acres)</mat-label>
				<input matInput type="number" formControlName="area" />
			</mat-form-field>

			<mat-form-field appearance="outline">
				<mat-label>Farmer ID</mat-label>
				<input matInput type="number" formControlName="farmer_id" />
			</mat-form-field>

			<button mat-flat-button color="primary" type="submit">Add Crop</button>
		</form>
	</mat-card>

	<mat-card class="page-card table-card">
		<table mat-table [dataSource]="crops">
			<ng-container matColumnDef="name">
				<th mat-header-cell *matHeaderCellDef>Name</th>
				<td mat-cell *matCellDef="let row">{{ row.name }}</td>
			</ng-container>

			<ng-container matColumnDef="season">
				<th mat-header-cell *matHeaderCellDef>Season</th>
				<td mat-cell *matCellDef="let row">{{ row.season }}</td>
			</ng-container>

			<ng-container matColumnDef="area">
				<th mat-header-cell *matHeaderCellDef>Area</th>
				<td mat-cell *matCellDef="let row">{{ row.area }}</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
		</table>
	</mat-card>
</section>
