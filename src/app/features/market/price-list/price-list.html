<section>
	<h2 class="section-title">Market Price List</h2>
	<mat-card class="page-card table-card">
		<table mat-table [dataSource]="prices">
			<ng-container matColumnDef="crop_name">
				<th mat-header-cell *matHeaderCellDef>Crop</th>
				<td mat-cell *matCellDef="let row">{{ row.crop_name }}</td>
			</ng-container>
			<ng-container matColumnDef="price">
				<th mat-header-cell *matHeaderCellDef>Price</th>
				<td mat-cell *matCellDef="let row">{{ row.price }}</td>
			</ng-container>
			<ng-container matColumnDef="market_name">
				<th mat-header-cell *matHeaderCellDef>Market</th>
				<td mat-cell *matCellDef="let row">{{ row.market_name }}</td>
			</ng-container>
			<ng-container matColumnDef="updated_at">
				<th mat-header-cell *matHeaderCellDef>Updated</th>
				<td mat-cell *matCellDef="let row">{{ row.updated_at || '-' }}</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
		</table>
	</mat-card>
</section>
