<mat-toolbar class="nav-toolbar">
	<span class="brand-name">KisanHub</span>

	<span class="spacer"></span>

	<button mat-icon-button [matMenuTriggerFor]="profileMenu" aria-label="User menu">
		<mat-icon>account_circle</mat-icon>
	</button>

	<mat-menu #profileMenu="matMenu">
		<button mat-menu-item disabled>
			<mat-icon>badge</mat-icon>
			<span>{{ authService.currentUser()?.username || 'User' }}</span>
		</button>
		<button mat-menu-item disabled>
			<mat-icon>verified_user</mat-icon>
			<span>{{ authService.userRole() || 'guest' }}</span>
		</button>
		<button mat-menu-item (click)="logout()">
			<mat-icon>logout</mat-icon>
			<span>Logout</span>
		</button>
	</mat-menu>
</mat-toolbar>
